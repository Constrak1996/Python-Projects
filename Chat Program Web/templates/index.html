<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

    <div id="sidebar">
        <h3>Rooms</h3>
        <div id="rooms"></div>

        <h3>Users</h3>
        <div id="users"></div>

        <h3>Voice</h3>
        <div id="voice-channels">
            <div class="voice-channel" data-channel="General">
                🔊 General
                <div class="voice-controls">
                    <button class="vc-join">Join</button>
                    <button class="vc-leave" style="display:none;">Leave</button>
                    <button class="vc-mute">Mute</button>
                </div>
            </div>

            <div class="voice-channel" data-channel="Gaming">
                🎮 Gaming
                <div class="voice-controls">
                    <button class="vc-join">Join</button>
                    <button class="vc-leave" style="display:none;">Leave</button>
                    <button class="vc-mute">Mute</button>
                </div>
            </div>
        </div>

    </div>

    <div id="main">
        <div id="voice-panel">
            <div id="voice-header">
                <span id="voice-channel-name">Not in a voice channel</span>
            </div>
            <div id="voice-users"></div>
            <div id="voice-controls">
                <button id="voice-join">Join</button>
                <button id="voice-leave" style="display:none;">Leave</button>
                <button id="voice-mute">Mute</button>
            </div>
        </div>

        <div id="chat"></div>

        <div id="input-area">
            <input id="message" type="text" placeholder="Type a message or command...">
            <button id="send">Send</button>
        </div>
    </div>


    <div id="context-menu" class="hidden">
        <div class="menu-item" data-action="edit">Edit</div>
        <div class="menu-item" data-action="delete">Delete</div>
    </div>

    <!-- Script -->
    <script src="/static/script.js"></script>

</body>
</html>
