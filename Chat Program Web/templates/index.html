<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }

        /* Sidebar */
        #sidebar {
            width: 250px;
            background: #222;
            color: #eee;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #rooms, #users {
            background: #333;
            padding: 10px;
            border-radius: 5px;
        }

        #rooms div, #users div {
            padding: 5px 0;
            cursor: pointer;
        }

        #rooms div:hover {
            color: #6cf;
        }

        /* Chat area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f5f5f5;
        }

        #input-area {
            display: flex;
            padding: 10px;
            gap: 5px;
            background: #ddd;
        }

        #message { flex: 1; }

        .system { color: #777; font-style: italic; }

    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Rooms</h3>
        <div id="rooms"></div>

        <h3>Users</h3>
        <div id="users"></div>
    </div>

    <div id="main">
        <div id="chat"></div>

        <div id="input-area">
            <input id="message" type="text" placeholder="Type a message or command...">
            <button id="send">Send</button>
        </div>
        <div id="typing-indicator" class="system" style="padding: 5px 10px; height: 20px;"></div>
    </div>

    <!-- Script -->
    <script src="/static/script.js"></script>

</body>
</html>
