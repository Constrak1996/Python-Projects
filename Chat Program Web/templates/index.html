<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

    <div id="sidebar">
        <h3>Rooms</h3>
        <div id="rooms"></div>

        <h3>Users</h3>
        <div id="users"></div>
    </div>

    <div id="main">
        <div id="chat"></div>

        <div id="input-area">
            <input id="message" type="text" placeholder="Type a message or command...">
            <button id="send">Send</button>
        </div>
    </div>

    <!-- Script -->
    <script src="/static/script.js"></script>

</body>
</html>
