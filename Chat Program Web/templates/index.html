<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
    /* Global layout */
    body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        height: 100vh;
        background: #1e1e1e;
        color: #ddd;
    }

    /* Sidebar */
    #sidebar {
        width: 260px;
        background: #111;
        color: #eee;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        border-right: 1px solid #333;
    }

    #rooms, #users {
        background: #181818;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
    }

    #rooms div, #users div {
        padding: 6px 0;
        cursor: pointer;
        border-bottom: 1px solid #2a2a2a;
    }

    #rooms div:last-child,
    #users div:last-child {
        border-bottom: none;
    }

    #rooms div:hover {
        color: #6cf;
    }

    /* Main chat area */
    #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #1e1e1e;
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
    }

    /* Each message gets a subtle separator */
    #chat div {
        padding: 6px 0;
        border-bottom: 1px solid #2a2a2a;
    }

    #chat div:last-child {
        border-bottom: none;
    }

    /* Input area */
    #input-area {
        display: flex;
        padding: 12px;
        gap: 8px;
        background: #111;
        border-top: 1px solid #333;
    }

    #message {
        flex: 1;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #333;
        background: #222;
        color: #eee;
    }

    #send {
        padding: 10px 18px;
        background: #333;
        color: #eee;
        border: 1px solid #444;
        border-radius: 4px;
        cursor: pointer;
    }

    #send:hover {
        background: #444;
    }

    /* System messages */
    .system {
        color: #888;
        font-style: italic;
    }

    /* Typing indicator */
    #typing-indicator {
        padding: 6px 12px;
        height: 22px;
        color: #aaa;
        font-style: italic;
    }

    /* Slide-up animation for new messages */
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message {
        animation: slideUp 0.25s ease-out;
    }

</style>

</head>
<body>

    <div id="sidebar">
        <h3>Rooms</h3>
        <div id="rooms"></div>

        <h3>Users</h3>
        <div id="users"></div>
    </div>

    <div id="main">
        <div id="chat"></div>

        <div id="input-area">
            <input id="message" type="text" placeholder="Type a message or command...">
            <button id="send">Send</button>
        </div>
        <div id="typing-indicator" class="system" style="padding: 5px 10px; height: 20px;"></div>
    </div>

    <!-- Script -->
    <script src="/static/script.js"></script>

</body>
</html>
